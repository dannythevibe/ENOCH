name: Keep Backend Awake

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend API
        run: |
          echo "Pinging backend at $BACKEND_URL to prevent Render sleep..."
          curl -f "$BACKEND_URL" || echo "Ping failed, but workflow will continue"
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
